<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💜</title>
  <link rel="stylesheet" href="MN.css">
</head>

<body>

<img src="WhatsApp Image 2026-03-24 at 10.24.16 PM.jpeg" class="bg-img" alt="Memory">

<div class="card">
  <h1>Will You Be Mine Forever? 💜</h1>
  <p>You are my happiness, my peace, my everything 💜</p>

  <div class="btn-area">
    <button id="yesBtn" onclick="window.location.href='MN2.html'">
      Yes 💜
    </button>
  </div>
</div>

<script>
  const btn = document.getElementById("yesBtn");
  const area = document.querySelector(".btn-area");

  btn.addEventListener("mouseover", () => {
    const areaRect = area.getBoundingClientRect();
    const btnWidth = btn.offsetWidth;
    const btnHeight = btn.offsetHeight;

    const x = Math.random() * (areaRect.width - btnWidth);
    const y = Math.random() * (areaRect.height - btnHeight);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
    btn.style.transform = "none";
  });
</script>

</body>
</html>
